name: CI - Build on PR

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore Orchestrator.sln
      
      - name: Build solution
        run: dotnet build Orchestrator.sln --configuration Release --no-restore
      
      - name: Run Unit Tests
        run: dotnet test tests/UnitTests --configuration Release --no-build --verbosity normal
        continue-on-error: true
      
      - name: Run Integration Tests
        run: dotnet test tests/IntegrationTests --configuration Release --no-build --verbosity normal
        continue-on-error: true
