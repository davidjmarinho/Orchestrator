apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-db-init
  namespace: fcg-tech-fase-2
data:
  init-konga-db.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE konga;
      GRANT ALL PRIVILEGES ON DATABASE konga TO kong;
    EOSQL

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-database
  namespace: fcg-tech-fase-2
  labels:
    app: kong-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-database
  template:
    metadata:
      labels:
        app: kong-database
    spec:
      containers:
        - name: postgres
          image: postgres:11-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kong-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kong-db-secret
                  key: password
            - name: POSTGRES_DB
              value: kong
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kong"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: kong-db-init

---
apiVersion: v1
kind: Service
metadata:
  name: kong-database
  namespace: fcg-tech-fase-2
  labels:
    app: kong-database
spec:
  type: ClusterIP
  selector:
    app: kong-database
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
