apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg-tech-fase-2
  labels:
    app: payments-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Aguardando PostgreSQL..."; until nc -z postgres 5432; do echo "PostgreSQL indisponível - aguardando..."; sleep 3; done; echo "PostgreSQL está pronto!"']
      - name: wait-rabbitmq
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Aguardando RabbitMQ..."; until nc -z rabbitmq 5672; do echo "RabbitMQ indisponível - aguardando..."; sleep 3; done; echo "RabbitMQ está pronto!"']
      containers:
      - name: payments-api
        image: davidjmarinho/payments-api:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        # Override ConnectionStrings.Default from appsettings.json
        - name: ConnectionStrings__Default
          value: "Host=postgres;Port=5432;Database=fcg_payments_db;Username=payments;Password=paymentspw"
        # Override RabbitMq config from appsettings.json
        - name: RabbitMq__Host
          value: rabbitmq
        - name: RabbitMq__Username
          value: admin
        - name: RabbitMq__Password
          value: admin123
        - name: RabbitMq__VirtualHost
          value: /
        # Application Configuration
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ASPNETCORE_URLS
          value: http://+:80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: fcg-tech-fase-2
spec:
  type: ClusterIP
  selector:
    app: payments-api
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
