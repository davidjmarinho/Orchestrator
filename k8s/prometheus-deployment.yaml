apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fcg-tech-fase-2
  labels:
    app: prometheus

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files: []

    scrape_configs:
      - job_name: "prometheus"
        metrics_path: /metrics
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "UsersAPI"
        metrics_path: /metrics
        static_configs:
          - targets: ["users-api:80"]
            labels:
              app: "users-api"

      - job_name: "CatalogAPI"
        metrics_path: /metrics
        static_configs:
          - targets: ["catalog-api:80"]
            labels:
              app: "catalog-api"

      - job_name: "PaymentsAPI"
        metrics_path: /metrics
        static_configs:
          - targets: ["payments-api:80"]
            labels:
              app: "payments-api"

      - job_name: "NotificationAPI"
        metrics_path: /metrics
        static_configs:
          - targets: ["notification-api:80"]
            labels:
              app: "notification-api"

      - job_name: "Orchestrator"
        metrics_path: /metrics
        static_configs:
          - targets: ["orchestrator:80"]
            labels:
              app: "orchestrator"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: fcg-tech-fase-2
  labels:
    app: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/

            - name: prometheus-storage-volume
              mountPath: /prometheus

      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config

        - name: prometheus-storage-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: fcg-tech-fase-2
  labels:
    app: prometheus

spec:
  selector:
    app: prometheus

  ports:
    - name: http
      port: 9090
      targetPort: 9090

  type: ClusterIP