apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: fcg-tech-fase-2
  labels:
    app: notification-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      initContainers:
      - name: wait-sqlserver
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Aguardando SQL Server..."; until nc -z sqlserver 1433; do echo "SQL Server indisponível - aguardando..."; sleep 3; done; echo "SQL Server está pronto!"']
      - name: wait-rabbitmq
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Aguardando RabbitMQ..."; until nc -z rabbitmq 5672; do echo "RabbitMQ indisponível - aguardando..."; sleep 3; done; echo "RabbitMQ está pronto!"']
      containers:
      - name: notification-api
        image: davidjmarinho/notification-api:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        # Override ConnectionStrings from appsettings.json
        # notification-api uses SQL Server (Microsoft.Data.SqlClient)
        - name: ConnectionStrings__ConnectionString
          value: "Server=sqlserver,1433;Database=fcg_notifications_db;User Id=sa;Password=SqlServer@2024;TrustServerCertificate=True"
        - name: ConnectionStrings__DockerConnectionString
          value: "Server=sqlserver,1433;Database=fcg_notifications_db;User Id=sa;Password=SqlServer@2024;TrustServerCertificate=True"
        # Override RabbitMQ config from appsettings.json
        - name: RabbitMQ__HostName
          value: rabbitmq
        - name: RabbitMQ__Port
          value: "5672"
        - name: RabbitMQ__UserName
          value: admin
        - name: RabbitMQ__Password
          value: admin123
        - name: RabbitMQ__VirtualHost
          value: /
        # Application Configuration
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ASPNETCORE_URLS
          value: http://+:80
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: fcg-tech-fase-2
spec:
  type: ClusterIP
  selector:
    app: notification-api
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
